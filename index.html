<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Master ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap');
        
        body { font-family: 'Orbitron', sans-serif; background: #050b18; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: #0f172a; padding: 30px; border-radius: 24px; width: 90%; max-width: 480px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid #38bdf8; position: relative; }
        
        /* زر الترجمة */
        #lang-btn { position: absolute; top: 15px; right: 15px; background: rgba(56, 189, 248, 0.2); border: 1px solid #38bdf8; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; z-index: 100; }
        
        .arabic { font-family: 'Cairo', sans-serif; direction: rtl; }
        
        h1 { font-size: 1.8rem; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); margin-top: 20px; }
        .stage-label { color: #38bdf8; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; }
        .question-text { font-size: 1.3rem; min-height: 90px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        
        .option-btn { background: rgba(56, 189, 248, 0.05); color: white; border: 1px solid #38bdf8; padding: 15px; margin: 8px 0; width: 100%; border-radius: 12px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .option-btn:hover { background: #38bdf8; color: #050b18; }
        
        .stats { display: flex; justify-content: space-between; font-size: 0.8rem; color: #94a3b8; margin-bottom: 20px; border-bottom: 1px solid #1e293b; padding-bottom: 10px; }
        .btn-nav { background: #38bdf8; color: #050010; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; }
        .hidden { display: none; }
        .glow { border-color: #10b981; background: rgba(16, 185, 129, 0.2); }
        .shake { animation: shake 0.4s; border-color: #ef4444; background: rgba(239, 68, 68, 0.2); }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-6px);} 75% {transform: translateX(6px);} }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <button id="lang-btn" onclick="toggleLang()">🌐 EN / AR</button>

    <div id="start-screen">
        <h1 id="title-text">PHYSICS MASTER</h1>
        <p id="sub-text" style="color:#94a3b8">Advanced Scientific Challenge</p>
        <div style="margin: 20px 0; color: #fbbf24;"><span id="best-text">Best Score</span>: <span id="high-val">0</span></div>
        <button class="btn-nav" id="start-btn" onclick="startStage(1)">START MISSION</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="stage-info" class="stage-label">STAGE 01</div>
        <div class="stats">
            <span><span id="score-label">SCORE</span>: <span id="score-val">0</span>/25</span>
            <span><span id="time-label">TIME</span>: <span id="timer-val">10</span>s</span>
        </div>
        <div class="question-text" id="q-text"></div>
        <div id="options-box"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="res-title"></h2>
        <p id="res-score"></p>
        <p id="res-msg" style="color:#fbbf24; margin-bottom: 20px;"></p>
        <div id="res-actions"></div>
    </div>
</div>

<script>
let currentLang = 'en';
const pools = {
    1: [
        {en: {q: "What is the unit of luminous intensity?", o: ["Candela", "Lumen", "Lux"]}, ar: {q: "ما هي وحدة قياس الشدة الضوئية؟", o: ["القنديلة", "اللومن", "اللوكس"]}, a: 0},
        {en: {q: "Frequency is measured in:", o: ["Hertz", "Period", "Watt"]}, ar: {q: "الكمية الفيزيائية التي تقاس بالهيرتز:", o: ["التردد", "الزمن الدوري", "الواط"]}, a: 0},
        {en: {q: "Which is a vector quantity?", o: ["Displacement", "Distance", "Mass"]}, ar: {q: "أي مما يلي كمية متجهة؟", o: ["الإزاحة", "المسافة", "الكتلة"]}, a: 0},
        {en: {q: "Slope of Position-Time graph is:", o: ["Velocity", "Acceleration", "Force"]}, ar: {q: "الميل في منحنى (الموقع-الزمن) يمثل:", o: ["السرعة", "التسارع", "القوة"]}, a: 0},
        {en: {q: "Fastest thing in the universe?", o: ["Light", "Sound", "Electricity"]}, ar: {q: "ما هو أسرع شيء في الكون؟", o: ["الضوء", "الصوت", "الكهرباء"]}, a: 0}
    ],
    // يمكنك إضافة المرحلة 2 و 3 بنفس النمط
};

let curStage = 1, stageScore = 0, totalScore = 0, qIdx = 0, stageQs = [], timer;

function toggleLang() {
    currentLang = currentLang === 'en' ? 'ar' : 'en';
    const gc = document.getElementById('game-container');
    if(currentLang === 'ar') gc.classList.add('arabic'); else gc.classList.remove('arabic');
    updateStaticTexts();
    if(!document.getElementById('quiz-screen').classList.contains('hidden')) renderQuestion();
}

function updateStaticTexts() {
    const t = {
        en: {title: "PHYSICS MASTER", sub: "Advanced Scientific Challenge", best: "Best Score", start: "START MISSION", score: "SCORE", time: "TIME"},
        ar: {title: "تحدي الفيزياء", sub: "اختبار علمي متقدم", best: "أفضل نتيجة", start: "ابدأ المهمة", score: "النقاط", time: "الوقت"}
    }[currentLang];
    document.getElementById('title-text').innerText = t.title;
    document.getElementById('sub-text').innerText = t.sub;
    document.getElementById('best-text').innerText = t.best;
    document.getElementById('start-btn').innerText = t.start;
    document.getElementById('score-label').innerText = t.score;
    document.getElementById('time-label').innerText = t.time;
}

function startStage(s) {
    curStage = s; stageScore = 0; qIdx = 0;
    stageQs = [...pools[1]].sort(() => 0.5 - Math.random());
    show('quiz-screen'); renderQuestion();
}

function renderQuestion() {
    if(qIdx >= stageQs.length) return finish();
    clearInterval(timer);
    const data = stageQs[qIdx];
    const langData = data[currentLang];
    const correctAnswer = data[currentLang].o[data.a]; // الإجابة الصحيحة بناءً على اللغة
    
    document.getElementById('stage-info').innerText = currentLang === 'en' ? `STAGE 0${curStage}` : `المرحلة 0${curStage}`;
    document.getElementById('score-val').innerText = stageScore;
    document.getElementById('q-text').innerText = langData.q;
    
    const box = document.getElementById('options-box'); box.innerHTML = "";
    
    // شفل الخيارات (عشوائية حقيقية)
    let shuffledOptions = [...langData.o].sort(() => 0.5 - Math.random());
    
    shuffledOptions.forEach(opt => {
        const b = document.createElement('button'); b.className = 'option-btn';
        b.innerText = opt;
        b.onclick = () => {
            clearInterval(timer);
            const all = document.querySelectorAll('.option-btn');
            all.forEach(btn => btn.disabled = true);
            if(opt === correctAnswer) {
                stageScore += 5; totalScore += 5; b.classList.add('glow');
            } else {
                b.classList.add('shake');
            }
            qIdx++; setTimeout(renderQuestion, 1000);
        };
        box.appendChild(b);
    });

    let s = 10; document.getElementById('timer-val').innerText = s;
    timer = setInterval(() => {
        s--; document.getElementById('timer-val').innerText = s;
        if(s <= 0) { clearInterval(timer); renderQuestion(qIdx++); }
    }, 1000);
}

function finish() {
    show('result-screen');
    const win = stageScore >= 15;
    const res = {
        en: {win: "MISSION SUCCESS ✨", fail: "MISSION FAILED 💡", next: "NEXT STAGE", retry: "RETRY"},
        ar: {win: "تمت المهمة بنجاح ✨", fail: "للأسف لم تنجح 💡", next: "المرحلة التالية", retry: "إعادة المحاولة"}
    }[currentLang];
    
    document.getElementById('res-title').innerText = win ? res.win : res.fail;
    document.getElementById('res-score').innerText = `${stageScore}/25`;
    document.getElementById('res-actions').innerHTML = win ? 
        `<button class="btn-nav" onclick="location.reload()">${res.next}</button>` : 
        `<button class="btn-nav" onclick="startStage(${curStage})">${res.retry}</button>`;
}

function show(id) {
    ['start-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

document.getElementById('high-val').innerText = localStorage.getItem('phys_high') || 0;
    // --- كود الموسيقى المطور ---
const bgMusic = new Audio('physics-music.mp3'); 
bgMusic.loop = true; 
bgMusic.volume = 0.3; // صوت هادئ لتركيز اللاعب
let isMusicStarted = false;

// تفعيل الموسيقى مع أول لمسة للشاشة
document.addEventListener('click', () => {
    if (!isMusicStarted) {
        bgMusic.play().then(() => {
            console.log("Music is playing now!");
        }).catch(err => {
            console.log("Playback failed:", err);
        });
        isMusicStarted = true;
    }
}, { once: true });
</script>
</body>
</html>
